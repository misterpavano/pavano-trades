<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pavano Trades — 2026-04-27</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #d4d4d4;
    font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace; }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px;
  }
  
  /* Header */
  .header {
    border-bottom: 2px solid #1a2a35;
    padding-bottom: 24px;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: #22c55e; }
  .header .tagline {
    color: #22c55e;
    font-size: 13px;
    margin-top: 6px;
    font-weight: 500;
  }
  .header .meta {
    color: #555555;
    font-size: 11px;
    margin-top: 10px;
    font-family: 'SF Mono', monospace;
  }
  
  /* Account Summary Card */
  .account-card {
    background: linear-gradient(135deg, #0d1f0d 0%, #0a150a 100%);
    border: 1px solid #1a3520;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 32px;
  }
  .account-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #22c55e;
    margin-bottom: 8px;
  }
  .account-card .balance {
    font-size: 36px;
    font-weight: 800;
    color: #ffffff;
  }
  .account-card .balance.negative { color: #ef4444; }
  .account-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #1a3520;
  }
  .stat .value {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
  }
  .stat .value.positive { color: #22c55e; }
  .stat .value.negative { color: #ef4444; }
  .stat .label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  
  /* Section Headers */
  .section {
    margin-bottom: 40px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1a2a35;
  }
  .section-header h2 {
    font-size: 12px;
    font-weight: 700;
    color: #22c55e;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'SF Mono', monospace;
  }
  .section-header .count {
    font-size: 11px;
    color: #666;
    font-family: 'SF Mono', monospace;
  }
  
  /* Position Cards */
  .position-card {
    background: #0e1418;
    border: 1px solid #162028;
    border-left: 3px solid #22c55e;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .position-card.put {
    border-left-color: #ef4444;
  }
  .position-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .position-title {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
  }
  .position-title .ticker {
    color: #22c55e;
  }
  .position-title .put .ticker {
    color: #ef4444;
  }
  .position-type {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: #1a3520;
    color: #22c55e;
    font-family: 'SF Mono', monospace;
  }
  .position-type.put {
    background: #351a1a;
    color: #ef4444;
  }
  
  /* Position Levels */
  .levels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #162028;
  }
  .level {
    text-align: center;
  }
  .level .value {
    font-family: 'SF Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
  }
  .level .value.stop { color: #ef4444; }
  .level .value.target { color: #22c55e; }
  .level .label {
    font-size: 9px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  
  /* News Grid */
  .news-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .news-card {
    background: #0e1418;
    border: 1px solid #162028;
    border-radius: 8px;
    padding: 14px;
  }
  .news-card:hover {
    border-color: #22c55e;
  }
  .news-source {
    font-size: 10px;
    color: #22c55e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .news-title {
    font-size: 13px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .news-summary {
    font-size: 11px;
    color: #888;
    line-height: 1.5;
  }
  
  /* Signal Cards */
  .signal-card {
    background: #0e1418;
    border: 1px solid #162028;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .signal-card:hover {
    border-color: #22c55e;
  }
  .signal-info {
    flex: 1;
  }
  .signal-title {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
  }
  .signal-score {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    background: #1a2a35;
    color: #22c55e;
    font-family: 'SF Mono', monospace;
  }
  .signal-score.high {
    background: #1a3520;
  }
  
  /* Stock Grid */
  .stock-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .stock-card-link {
    display: block;
  }
  .stock-card {
    background: #0e1418;
    border: 1px solid #162028;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    transition: all 0.2s;
  }
  .stock-card:hover {
    border-color: #22c55e;
    transform: translateY(-2px);
  }
  .stock-card.up {
    border-left: 3px solid #22c55e;
  }
  .stock-card.down {
    border-left: 3px solid #ef4444;
  }
  .stock-ticker {
    font-family: 'SF Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 6px;
  }
  .stock-price {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
  }
  .stock-change {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .stock-change.positive { color: #22c55e; }
  .stock-change.negative { color: #ef4444; }
  
  @media (max-width: 600px) {
    .container { padding: 20px 16px; }
    .header h1 { font-size: 22px; }
    .account-stats { grid-template-columns: repeat(2, 1fr); }
    .levels { grid-template-columns: 1fr; }
    .position-header { flex-direction: column; gap: 8px; }
    .news-grid { grid-template-columns: 1fr; }
    .stock-grid { grid-template-columns: repeat(2, 1fr); }
  }
  
  /* Trade History */
  .trade-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #111a22;
  }
  .trade-row:last-child {
    border-bottom: none;
  }
  .trade-row:hover {
    background: #0e1418;
  }
  .trade-info {
    flex: 1;
  }
  .trade-title {
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
  }
  .trade-title .win { color: #22c55e; }
  .trade-title .loss { color: #ef4444; }
  .trade-pnl {
    font-family: 'SF Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    text-align: right;
  }
  .trade-pnl.positive { color: #22c55e; }
  .trade-pnl.negative { color: #ef4444; }
  
  /* Watchlist */
  .watchlist {
    font-family: 'SF Mono', monospace;
    font-size: 12px;
    color: #888;
    line-height: 1.8;
    background: #0e1418;
    border: 1px solid #162028;
    border-radius: 8px;
    padding: 16px;
  }
  .watchlist .ticker {
    color: #22c55e;
    font-weight: 600;
  }
  
  /* Footer */
  .footer {
    border-top: 1px solid #1a2a35;
    padding-top: 24px;
    margin-top: 48px;
    font-size: 11px;
    color: #444;
    font-family: 'SF Mono', monospace;
    text-align: center;
  }
  .footer .brand { color: #22c55e; }
  
  @media (max-width: 600px) {
    .container { padding: 20px 16px; }
    .header h1 { font-size: 22px; }
    .account-stats { grid-template-columns: repeat(2, 1fr); }
    .levels { grid-template-columns: 1fr; }
    .position-header { flex-direction: column; gap: 8px; }
    .news-grid { grid-template-columns: 1fr; }
    .stock-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span>▶</span> Pavano Trades</h1>
    <div class="tagline">Live paper trading plays, signals &amp; performance</div>
    <div class="meta">2026-04-27 | 2026-04-27T13:32:16Z | Paper Trading Account</div>
  </div>

  
  

  
  
  <div class="section">
    <div class="section-header">
      <h2>Market Brief</h2>
      <span class="count">1 items</span>
    </div>

    
      
      <div class="trade-row" style="background: #0e1418; border: 1px solid #162028; border-radius: 8px; margin-bottom: 8px;">
        <div class="trade-info" style="padding: 12px;">
          <div class="trade-title">Market data unavailable</div>
          <div style="color: #888; font-size: 12px; margin-top: 4px;"></div>
        </div>
      </div>
      
    
  </div>
  

  <div class="footer">
    <p><span class="brand">Pavano Trades</span> | Paper Trading Account</p>
    <p style="margin-top: 8px;">Not financial advice. For educational purposes only.</p>
  </div>
</div>
</body>
</html>
